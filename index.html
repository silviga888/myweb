<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>实时金价行情 - 黄金白银铂金钯金价格追踪</title>
    <meta name="description" content="实时追踪国际金价、银价、铂金、钯金行情，提供24K/18K等各纯度参考价格，支持自动刷新。">
    
    <meta property="og:title" content="实时金价行情">
    <meta property="og:description" content="实时追踪黄金、白银、铂金、钯金国际价格">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://silviga888.github.io/myweb/share-thumb.png">
    
    <meta name="wx:title" content="实时金价行情">
    <meta name="wx:description" content="点击查看今日黄金、白银、铂金最新价格">
    <meta name="wx:image" content="https://silviga888.github.io/myweb/share-thumb.png">
    <link rel="stylesheet" href="/myweb/goldPrice.css">
    <base target="_blank">
</head>
<body>
    <img src="share-thumb.jpg" alt="金价行情" style="position:absolute;left:-9999px;top:-9999px;width:1px;height:1px;">
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <p>正在同步行情数据...</p>
    </div>

    <div class="toast success-toast" id="successToast"></div>
    <div class="toast error-toast" id="errorToast"></div>

    <header class="header">
        <div class="header-content">
            <div class="logo">
                <i data-lucide="clock-8"></i>
                <span>实时金价行情</span>
            </div>
            <div class="status-bar">
                <div class="live-indicator">
                    <span class="live-dot"></span>
                    <span>LIVE</span>
                </div>
                <div class="last-update" id="lastUpdate">
                    <span>更新于: --:--:--</span>
                </div>
                <button class="refresh-btn" id="refreshBtn" onclick="manualRefresh()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
                    </svg>
                    刷新
                </button>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="table-section">
            <h2 class="section-title">
                <i data-lucide="circle-dollar-sign" class="lucideIcon"></i>
                贵金属实时行情
                <button class="unit-btn" id="unitBtn" onclick="toggleUnit()">单位：美元/盎司</button>
            </h2>
            <div class="table-wrapper">
                <table class="data-table" id="mainTable">
                    <thead>
                        <tr>
                            <th class="col-metal">金属</th>
                            <th class="col-price" id="thPrice">最新价</th>
                            <th class="col-change" id="thChange">涨跌额</th>
                            <th class="col-change-p" style="width: 110px;">涨跌幅</th>
                            <th class="col-bid" id="thBid">买入价</th>
                            <th class="col-ask" id="thAsk">卖出价</th>
                            <th class="col-open" id="thOpen">开盘价</th>
                            <th class="col-high" id="thHigh">最高价</th>
                            <th class="col-low" id="thLow">最低价</th>
                        </tr>
                    </thead>
                    <tbody id="mainTableBody"></tbody>
                </table>
            </div>
        </section>

        <section class="table-section">
            <h2 class="section-title">
                <i data-lucide="cuboid" class="lucideIcon"></i>
                黄金各纯度每克参考价
            </h2>
            <div class="table-wrapper">
                <table class="data-table" id="karatTable">
                    <thead>
                        <tr>
                            <th>纯度</th>
                            <th>含金量</th>
                            <th>美元/克</th>
                            <th>人民币/克</th>
                        </tr>
                    </thead>
                    <tbody id="karatTableBody"></tbody>
                </table>
            </div>
        </section>

        <section class="table-section">
            <h2 class="section-title">
                <i data-lucide="chart-candlestick" class="lucideIcon"></i>
                主要货币汇率
            </h2>
            <div class="table-wrapper">
                <table class="data-table" id="forexTable">
                    <thead>
                        <tr>
                            <th>货币对</th>
                            <th>汇率</th>
                        </tr>
                    </thead>
                    <tbody id="forexTableBody"></tbody>
                </table>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>数据为即时获取，可能因数据来源不同产生略微偏差</p>
    </footer>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        lucide.createIcons();
    </script>
    <script src="/myweb/goldPrice.js"></script>
</body>
</html>
